<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waitlist | Healthtech</title>
  <meta name="description" content="Entre na lista de espera da nova healthtech premium para médicos brasileiros." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="waitlist-body">
  <main class="waitlist-main">
    <section class="waitlist-hero">
      <div class="container narrow">
        <a href="index.html" class="back-link">← Voltar para o site</a>
        <span class="eyebrow center">Pré-lançamento</span>
        <h1>Entre na lista de espera e acompanhe o lançamento.</h1>
        <p class="center-text">
          Cadastre-se para receber novidades, acesso antecipado e informações sobre a estreia oficial.
        </p>

        <div class="waitlist-counter">
          <strong id="subscriberCount">1.248</strong>
          <span>profissionais já demonstraram interesse</span>
        </div>

        <form class="waitlist-form" id="waitlistForm">
          <div class="field-group">
            <label for="waitlistName">Nome</label>
            <input type="text" id="waitlistName" name="nome" placeholder="Seu nome" required>
          </div>

          <div class="field-group">
            <label for="waitlistEmail">E-mail</label>
            <input type="email" id="waitlistEmail" name="email" placeholder="voce@exemplo.com" required>
          </div>

          <button type="submit" class="btn btn-primary full">Entrar na waitlist</button>
          <p class="form-note center-text">Integre com Mailchimp, Brevo, RD Station ou outra ferramenta.</p>
          <p class="form-feedback" id="waitlistFeedback"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
